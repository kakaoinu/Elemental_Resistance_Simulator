<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>REDSTONE 属性抵抗シミュレーター</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <h1>REDSTONE 属性抵抗シミュレーター</h1>

    <div class="grid">
        <div class="section">
            <h3 style="border-bottom: none; margin-bottom: 10px;">基本ボーナス</h3>
            <div class="input-block">
                <label>知恵ステータス</label>
                <input type="number" id="input_wisdom" value="0" min="0">
                <div class="sub-text" style="color:#e6b953;">全属性ボーナス: +<span id="disp_wis_bonus">0</span>%</div>
            </div>
            <hr>
            <div class="input-block">
                <label>その他加算 (クリーチャー等 %)</label>
                <input type="number" id="input_other_bonus" value="0" min="0">
                <div class="sub-text" style="visibility: hidden;">spacer</div>
            </div>
            <hr>
            <div class="input-block">
                <label>追加ボーナス</label>
                <div class="bonus-group">
                    <label class="compact-check">
                        <input type="checkbox" id="check_redstone" class="rs-check-custom">
                        <span>REDSTONE所持 (+5%)</span>
                    </label>
                    <label class="compact-check">
                        <input type="checkbox" id="check_mb" class="rs-check-custom">
                        <span>MB (+14%)</span>
                    </label>
                    <label class="compact-check">
                        <input type="checkbox" id="check_potential" class="rs-check-custom">
                        <span>潜在Lv29 (+10%)</span>
                    </label>
                </div>
            </div>
        </div>

        <div class="section">
            <h3 style="border-bottom: none; margin-bottom: 10px;">フィールド・デバフ</h3>
            <div class="input-block">
                <label>フィールド低下 (GvG/マップ)</label>
                <select id="input_field">
                    <option value="subain">廃墟スバイン要塞</option>
                    <option value="none">ソゴム山脈 / 赤い丘</option>
                    <option value="elberg">エルベルグ山脈 / 岩の谷</option>
                    <option value="defhills" selected>デフヒルズ / 砂漠の遺跡</option>
                    <option value="babel">バベル大河 / 2粒の涙</option>
                    <option value="nadara">ナダラ平原 / 2つの丘</option>
                    <option value="none">ハノブ / 地下決闘場</option>
                </select>
                <div class="sub-text" style="visibility: hidden;">spacer</div>
            </div>
            <hr>
            <div class="input-block">
                <label>ウルトラノヴァ 低下 (MAX90%)</label>
                <input type="number" id="input_fixed_debuff" value="90" min="0" max="90">
                <div class="sub-text" style="visibility: hidden;">spacer</div>
            </div>
            <hr>
            <div class="input-block">
                <label style="line-height: 1.2;">敵の弱化装備 (魔法+属性弱化: MAX240%)</label>
                <input type="number" id="input_weaken" value="240" min="0" max="240">
                <div class="sub-text" style="visibility: hidden;">spacer</div>
            </div>
        </div>
    </div>
    <div class="section">
        <h3>石像ランク (抵抗+1% / ペナ減+3% / MAX Lv5)</h3>
        
        <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px;">
            <div class="flex-row">
                <label class="attr-all" style="width:210px; font-size:0.8rem;">ケーメンの冠.枠飾り(全属性抵抗)</label>
                <input type="number" id="statue_all" value="0" min="0" max="5">
            </div>
            <div class="flex-row">
                <label class="attr-light" style="width:210px; font-size:0.8rem;">ラークの刀.鞘(光) [全ペナ減]</label>
                <input type="number" id="statue_all_pen" value="0" min="0" max="5">
            </div>
        </div>

        <div class="grid statue-grid-row" style="grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));">
            <div class="flex-row statue-item">
                <label class="attr-fire" style="width:160px; font-size:0.8rem;">ナルの神像.胴体(火)</label>
                <input type="number" id="statue_fire" value="0" min="0" max="5">
            </div>
            <div class="flex-row statue-item">
                <label class="attr-water" style="width:160px; font-size:0.8rem;">ネーンの杯.器(水)</label>
                <input type="number" id="statue_water" value="0" min="0" max="5">
            </div>
            <div class="flex-row statue-item">
                <label class="attr-wind" style="width:160px; font-size:0.8rem;">スルの杖.シャフト(風)</label>
                <input type="number" id="statue_wind" value="0" min="0" max="5">
            </div>
            <div class="flex-row statue-item">
                <label class="attr-earth" style="width:160px; font-size:0.8rem;">ケーメンの冠.本体(土)</label>
                <input type="number" id="statue_earth" value="0" min="0" max="5">
            </div>
            <div class="flex-row statue-item">
                <label class="attr-light" style="width:160px; font-size:0.8rem;">ラークの刀.刀身(光)</label>
                <input type="number" id="statue_light" value="0" min="0" max="5">
            </div>
            <div class="flex-row statue-item">
                <label class="attr-dark" style="width:160px; font-size:0.8rem;">シロイオのホール.本体(闇)</label>
                <input type="number" id="statue_dark" value="0" min="0" max="5">
            </div>
        </div>
    </div>

    <div class="section" id="equip_section">
        <h3>装備構成</h3>
        <div class="notice-text">※属性抵抗値の上がる装備をつけている場合のみ入力してください。</div>
        
        <div class="grid" id="equip_container" style="grid-template-columns: 1fr 1fr;">
            </div>

        <hr>

        <h4 style="color: #e6b953; font-size: 1.1rem; margin: 0 0 10px 0; border-bottom: 1px dashed #3d2b1f; padding-bottom: 5px;">錬成・製錬オプション</h4>
        <div class="notice-text" style="margin-top: 5px; margin-bottom: 20px; border-left-color: #e6b953;">
            ※装備に付与されている「錬成OP」や「製錬OP」による抵抗値の合計をこちらに入力してください。
        </div>
        
        <div style="margin-bottom: 15px;">
            <div class="flex-row rensei-single">
                <label style="width:70px; color:#e6b953;">全属性</label>
                <input type="number" id="rensei_all" value="0" min="0">
            </div>
        </div>

        <div class="grid rensei-grid">
            <div class="flex-row rensei-item">
                <label style="width:50px;" class="attr-fire">火</label>
                <input type="number" id="rensei_fire" value="0" min="0">
            </div>
            <div class="flex-row rensei-item">
                <label style="width:50px;" class="attr-water">水</label>
                <input type="number" id="rensei_water" value="0" min="0">
            </div>
            <div class="flex-row rensei-item">
                <label style="width:50px;" class="attr-wind">風</label>
                <input type="number" id="rensei_wind" value="0" min="0">
            </div>
            <div class="flex-row rensei-item">
                <label style="width:50px;" class="attr-earth">土</label>
                <input type="number" id="rensei_earth" value="0" min="0">
            </div>
            <div class="flex-row rensei-item">
                <label style="width:50px;" class="attr-light">光</label>
                <input type="number" id="rensei_light" value="0" min="0">
            </div>
            <div class="flex-row rensei-item">
                <label style="width:50px;" class="attr-dark">闇</label>
                <input type="number" id="rensei_dark" value="0" min="0">
            </div>
        </div>
    </div>

    <div class="section">
        <h3>計算結果</h3>
        <table>
            <thead>
                <tr>
                    <th>属性</th>
                    <th>属性抵抗合計<br><span class="calc-sub">(基礎)</span></th>
                    <th>低下<br><span class="calc-sub">(ﾏｯﾌﾟ+ﾉｳﾞｧ等)</span></th>
                    <th>弱化<br><span class="calc-sub">(敵から)</span></th>
                    <th>最終有効抵抗<br><span class="calc-sub">(上限70)</span></th>
                </tr>
            </thead>
            <tbody id="result_tbody">
                </tbody>
        </table>
    </div>
</div>

<script type="module" src="script/main.js"></script>
</body>
</html>
